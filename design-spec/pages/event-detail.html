<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 事件详情 (Event Detail)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }

        /* 手机模型 */
        .phone {
            width: 375px; height: 812px; background: white; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }

        .status-bar { height: 44px; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; z-index: 20; position: absolute; width: 100%; top: 0; color: white; }

        /* 沉浸式 Hero */
        .hero { height: 480px; position: relative; background: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80') center/cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7)); }
        
        /* 顶部导航控制 */
        .nav-top { position: absolute; top: 54px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .nav-btn { width: 44px; height: 44px; border-radius: 22px; background: rgba(2, 6, 23, 0.3); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; color: white; }

        /* 播放中心交互 (NEW) */
        .play-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5;
        }
        .play-circle {
            width: 80px; height: 80px; border-radius: 40px; background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.3); margin-bottom: 16px; transition: 0.3s; cursor: pointer;
        }
        .play-circle:hover { transform: scale(1.1); background: rgba(255,255,255,0.3); }
        .play-label { color: white; font-size: 13px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        /* 内容区 */
        .content { flex: 1; overflow-y: auto; background: white; border-top-left-radius: 40px; border-top-right-radius: 40px; margin-top: -40px; position: relative; padding: 40px 28px; }
        .eyebrow { font-size: 12px; font-weight: 900; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
        .title { font-size: 36px; font-weight: 900; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 24px; color: var(--ink); }
        .story { font-size: 17px; color: var(--ink-soft); line-height: 1.8; font-weight: 500; margin-bottom: 40px; }

        /* 章节卡片 */
        .section-label { font-size: 12px; font-weight: 900; color: var(--ink); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 20px; }
        .chapter-card { background: var(--surface); padding: 24px; border-radius: 32px; display: flex; gap: 20px; align-items: center; margin-bottom: 16px; }
        .chapter-thumb { width: 90px; height: 90px; border-radius: 20px; background: #CBD5E1; }
        .chapter-info h4 { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
        .chapter-info p { font-size: 14px; color: var(--ink-soft); font-weight: 500; }

        /* 模拟菜单 Sheet (弹出效果) */
        .menu-overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.4); z-index: 100; display: none; }
        .menu-sheet { 
            position: absolute; bottom: 0; left: 0; right: 0; background: white; 
            border-top-left-radius: 40px; border-top-right-radius: 40px; padding: 32px 24px 48px;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .menu-sheet.active { transform: translateY(0); }
        .menu-item { padding: 20px 0; display: flex; align-items: center; gap: 16px; cursor: pointer; }
        .menu-item h4 { font-size: 18px; font-weight: 800; color: var(--ink); }
        .menu-item.danger h4 { color: #EF4444; }
        .menu-handle { width: 44px; height: 5px; background: #E2E8F0; border-radius: 10px; margin: 0 auto 24px; }

    </style>
</head>
<body>

    <div class="phone">
        <div class="status-bar"><span>9:41</span></div>
        
        <div class="hero">
            <div class="hero-overlay"></div>
            <div class="nav-top">
                <div class="nav-btn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/></svg>
                </div>
                <!-- 右上角三点菜单 -->
                <div class="nav-btn" onclick="toggleMenu()">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
                </div>
            </div>

            <!-- 浮动播放中心 -->
            <div class="play-center">
                <div class="play-circle">
                    <svg width="32" height="32" fill="white" viewBox="0 0 16 16"><path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                </div>
                <div class="play-label">Play Memory</div>
            </div>
        </div>

        <div class="content">
            <div class="eyebrow">MARCH 2026 · HANGZHOU</div>
            <h1 class="title">西湖漫步：<br>光影间的静谧</h1>
            <p class="story">
                湖面上升腾起淡淡的薄雾，远处的断桥在晨曦中若隐若现。那一刻，时间仿佛静止了，只有柳枝轻轻拂过水面的声音。
            </p>

            <div class="section-label">故事章节</div>
            <div class="chapter-card">
                <div class="chapter-thumb"></div>
                <div class="chapter-info">
                    <h4>晨曦初露</h4>
                    <p>湖边的第一抹阳光</p>
                </div>
            </div>
            <div class="chapter-card">
                <div class="chapter-thumb" style="background:#E2E8F0;"></div>
                <div class="chapter-info">
                    <h4>柳浪闻莺</h4>
                    <p>穿过翠绿的林荫道</p>
                </div>
            </div>
        </div>

        <!-- 操作菜单 Sheet -->
        <div class="menu-overlay" id="overlay" onclick="toggleMenu()"></div>
        <div class="menu-sheet" id="sheet">
            <div class="menu-handle"></div>
            <div class="menu-item">
                <svg width="24" height="24" fill="var(--ink)" viewBox="0 0 16 16"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708l-3-3zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207l6.707-6.707z"/></svg>
                <h4>重命名回忆</h4>
            </div>
            <div class="menu-item">
                <svg width="24" height="24" fill="var(--ink)" viewBox="0 0 16 16"><path d="M4.5 3a2.5 2.5 0 0 1 5 0v9a1.5 1.5 0 0 1-3 0V5a.5.5 0 0 1 1 0v7a.5.5 0 0 0 1 0V3a1.5 1.5 0 1 0-3 0v9a2.5 2.5 0 0 0 5 0V5a.5.5 0 0 1 1 0v7a3.5 3.5 0 1 1-7 0V3z"/></svg>
                <h4>管理照片</h4>
            </div>
            <div class="menu-item">
                <svg width="24" height="24" fill="var(--ink)" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/></svg>
                <h4>重新生成故事</h4>
            </div>
            <div class="menu-item danger">
                <svg width="24" height="24" fill="#EF4444" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                <h4>删除这段回忆</h4>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sheet = document.getElementById('sheet');
            const overlay = document.getElementById('overlay');
            if(sheet.classList.contains('active')) {
                sheet.classList.remove('active');
                overlay.style.display = 'none';
            } else {
                sheet.classList.add('active');
                overlay.style.display = 'block';
            }
        }
    </script>
</body>
</html>
