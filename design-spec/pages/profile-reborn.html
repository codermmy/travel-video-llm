<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 个人中心 (Profile)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }
        .phone {
            width: 375px; height: 812px; background: white; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }
        .content { flex: 1; overflow-y: auto; padding: 60px 24px 100px; }
        .page-title { font-size: 34px; font-weight: 900; letter-spacing: -1.2px; margin-bottom: 32px; }

        /* 身份标识 */
        .identity { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .avatar { width: 80px; height: 80px; border-radius: 40px; background: var(--ink); display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; font-weight: 900; }
        .id-info h2 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        .badge { background: var(--surface); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; margin-top: 6px; display: inline-block; }

        /* 数据卡片组 */
        .stats { display: flex; gap: 12px; margin-bottom: 40px; }
        .stat-card { flex: 1; background: var(--surface); padding: 20px 12px; border-radius: 24px; text-align: center; }
        .stat-card span { display: block; font-size: 20px; font-weight: 900; }
        .stat-card label { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-top: 4px; display: block; }

        /* 功能列表 */
        .list-group { margin-bottom: 32px; }
        .group-label { font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
        .list-row { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid #F1F5F9; cursor: pointer; }
        .icon-box { width: 44px; height: 44px; border-radius: 12px; background: var(--surface); display: flex; align-items: center; justify-content: center; }
        .row-info h4 { font-size: 17px; font-weight: 800; }
        .row-info p { font-size: 13px; color: var(--muted); font-weight: 500; }
        .chevron { margin-left: auto; color: #E2E8F0; }

    </style>
</head>
<body>
    <div class="phone">
        <div class="content">
            <h1 class="page-title">我的</h1>
            <div class="identity">
                <div class="avatar">M</div>
                <div class="id-info">
                    <h2>这台设备</h2>
                    <div class="badge">本机加密 · 安全</div>
                </div>
                <div class="chevron"><svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg></div>
            </div>

            <div class="stats">
                <div class="stat-card"><span>14</span><label>回忆</label></div>
                <div class="stat-card"><span>1,240</span><label>记录</label></div>
                <div class="stat-card"><span>0</span><label>任务</label></div>
            </div>

            <div class="list-group">
                <div class="group-label">实验室</div>
                <div class="list-row">
                    <div class="icon-box"><svg width="20" height="20" fill="var(--ink)" viewBox="0 0 16 16"><path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/></svg></div>
                    <div class="row-info"><h4>整理任务</h4><p>管理 AI 故事生成</p></div>
                    <div class="chevron"><svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg></div>
                </div>
            </div>

            <div class="list-group">
                <div class="group-label">通用</div>
                <div class="list-row">
                    <div class="icon-box"><svg width="20" height="20" fill="#10B981" viewBox="0 0 16 16"><path d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.775 11.775 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7.159 7.159 0 0 0 1.048-.625 11.777 11.775 0 0 0 2.517-2.453c1.678-2.195 2.461-5.513 2.465-9.99a1.541 1.541 0 0 0-1.044-1.263 62.467 62.467 0 0 0-2.887-.87C9.843.266 8.69 0 8 0zm0 5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/></svg></div>
                    <div class="row-info"><h4>隐私保护</h4><p>照片仅在本机分析</p></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
