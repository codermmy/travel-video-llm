<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 地图探索 (Functional Map)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }
        
        .phone {
            width: 375px; height: 812px; background: white; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }

        .map-layer { flex: 1; background: #E2E8F0 url('https://api.mapbox.com/styles/v1/mapbox/light-v10/static/120.15,30.25,12,0/800x1200?access_token=unused') center/cover; position: relative; }

        /* 1:1 还原 Top Overlay 动线 */
        .top-overlay { position: absolute; top: 54px; left: 16px; right: 16px; gap: 12px; display: flex; flex-direction: column; }
        .top-row { display: flex; gap: 10px; align-items: center; }
        
        .scope-pill { flex: 1; height: 48px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 24px; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .scope-pill span { font-size: 14px; font-weight: 800; color: var(--ink); }

        .tool-btn { width: 48px; height: 48px; border-radius: 24px; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }

        /* 待补地点 Banner */
        .pending-banner { background: #FEF3C7; padding: 12px 16px; border-radius: 16px; display: flex; align-items: center; gap: 10px; border: 1px solid #FDE68A; }
        .pending-banner p { font-size: 12px; font-weight: 700; color: #92400E; flex: 1; }

        /* 标准 Marker 样式 */
        .marker { position: absolute; top: 45%; left: 55%; width: 52px; height: 52px; border-radius: 26px; background: white; padding: 3px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        .marker img { width: 100%; height: 100%; border-radius: 23px; object-fit: cover; }
        .marker .badge { position: absolute; top: -4px; right: -4px; background: var(--accent); color: white; font-size: 10px; font-weight: 900; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }

        /* 1:1 还原底部 EventCardList 动线 */
        .bottom-list {
            position: absolute; bottom: 24px; left: 16px; right: 16px;
            background: white; border-radius: 32px; padding: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .handle { width: 40px; height: 4px; background: #E2E8F0; border-radius: 2px; margin: 0 auto 12px; }
        .list-header { padding: 4px 12px 12px; border-bottom: 1px solid #F1F5F9; margin-bottom: 12px; }
        .list-header h4 { font-size: 17px; font-weight: 900; }
        
        .list-item { display: flex; gap: 14px; align-items: center; padding: 8px 4px; }
        .item-thumb { width: 64px; height: 64px; border-radius: 14px; background: #F1F5F9; }
        .item-info { flex: 1; }
        .item-info h5 { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
        .item-info p { font-size: 12px; color: var(--muted); font-weight: 600; }
        .btn-enter { color: var(--accent); font-size: 12px; font-weight: 900; display: flex; align-items: center; gap: 4px; }

    </style>
</head>
<body>
    <div class="phone">
        <div class="map-layer">
            <!-- 顶部浮层结构 -->
            <div class="top-overlay">
                <div class="top-row">
                    <div class="scope-pill"><span>西湖区 · 3 个回忆</span></div>
                    <div class="tool-btn">
                        <svg width="20" height="20" fill="var(--ink)" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.5-12.5a.5.5 0 0 1 1 0V7h3a.5.5 0 0 1 0 1h-3v3.5a.5.5 0 0 1-1 0V8h-3a.5.5 0 0 1 0-1h3V3.5z"/></svg>
                    </div>
                    <div class="tool-btn">
                        <svg width="20" height="20" fill="var(--ink)" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/></svg>
                    </div>
                </div>
                <!-- 待补地点提示 -->
                <div class="pending-banner">
                    <svg width="16" height="16" fill="#B45309" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.308.533.19 0 .452-.088.65-.236l.72-.512-.238.754c-.18.578-.553 1.07-1.134 1.07-.594 0-1.037-.443-1.037-1.077 0-.387.05-.767.176-1.132l.99-4.703c.069-.34-.029-.533-.307-.533-.19 0-.452.088-.65.236L5.458 6.06l.238-.754c.18-.578.553-1.07 1.134-1.07.594 0 1.037.443 1.037 1.077 0 .387-.05.767-.176 1.132zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg>
                    <p>有 2 个事件需要补充地点</p>
                    <span style="font-size: 11px; font-weight: 900; color: #B45309;">去处理</span>
                </div>
            </div>

            <!-- 标准 Marker -->
            <div class="marker">
                <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=200">
                <div class="badge">3</div>
            </div>

            <!-- 底部滑动列表结构 -->
            <div class="bottom-list">
                <div class="handle"></div>
                <div class="list-header">
                    <h4>西湖区附近的回忆</h4>
                </div>
                <div class="list-item">
                    <div class="item-thumb" style="background: url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=200') center/cover;"></div>
                    <div class="item-info">
                        <h5>西湖漫步</h5>
                        <p>03月15日 · 12张照片</p>
                    </div>
                    <div class="btn-enter">
                        <span>详情</span>
                        <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
