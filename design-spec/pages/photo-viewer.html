<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 大图查看 (Photo Viewer)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }
        .phone {
            width: 375px; height: 812px; background: #000000; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }
        
        .main-photo { flex: 1; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800') center/contain no-repeat; }

        /* 顶部通透控制栏 */
        .top-bar { position: absolute; top: 54px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { width: 40px; height: 40px; border-radius: 20px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; color: white; }
        .photo-count { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 6px 14px; border-radius: 20px; color: white; font-size: 13px; font-weight: 800; }

        /* 底部信息与操作 */
        .bottom-info { position: absolute; bottom: 44px; left: 0; right: 0; padding: 32px 24px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; }
        .location { font-size: 13px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; color: rgba(255,255,255,0.7); }
        .date { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
        
        .action-row { display: flex; gap: 12px; }
        .btn-circle { width: 48px; height: 48px; border-radius: 24px; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>
    <div class="phone">
        <div class="main-photo"></div>
        <div class="top-bar">
            <div class="back-btn">
                <svg width="20" height="20" fill="white" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/></svg>
            </div>
            <div class="photo-count">1 / 12</div>
            <div class="back-btn">
                <svg width="20" height="20" fill="white" viewBox="0 0 16 16"><path d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
            </div>
        </div>
        <div class="bottom-info">
            <div class="location">杭州 · 西湖风景区</div>
            <div class="date">2026年3月15日 14:20</div>
            <div class="action-row">
                <div class="btn-circle">
                    <svg width="20" height="20" fill="white" viewBox="0 0 16 16"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708l-3-3zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207l6.707-6.707z"/></svg>
                </div>
                <div class="btn-circle">
                    <svg width="20" height="20" fill="white" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/></svg>
                </div>
                <div class="btn-circle" style="margin-left: auto;">
                    <svg width="20" height="20" fill="#EF4444" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
