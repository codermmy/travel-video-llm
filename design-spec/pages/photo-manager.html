<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 管理照片 (Photo Management)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }
        .phone {
            width: 375px; height: 812px; background: white; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }
        
        /* 顶部标题与添加按钮 */
        .header { padding: 60px 24px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .btn-add { width: 44px; height: 44px; border-radius: 22px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--accent); }

        /* 状态切换栏 */
        .mode-bar { padding: 0 24px 16px; border-bottom: 1px solid #F1F5F9; }
        .mode-text { font-size: 13px; font-weight: 700; color: var(--muted); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; padding: 2px; flex: 1; overflow-y: auto; }
        .cell { aspect-ratio: 1; background: #E2E8F0; position: relative; }
        .cell.selected { opacity: 0.6; }
        .cell.selected::after {
            content: "✓"; position: absolute; bottom: 8px; right: 8px; width: 20px; height: 20px;
            background: var(--accent); border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: 900; color: white;
        }

        /* 底部上下文工具栏 (仅在选中时弹出) */
        .context-footer { background: var(--ink); padding: 24px 24px 44px; display: flex; gap: 12px; border-top-left-radius: 32px; border-top-right-radius: 32px; }
        .btn-tool { flex: 1; height: 52px; border-radius: 16px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; font-size: 14px; color: white; }
        .btn-tool.danger { background: rgba(239, 68, 68, 0.2); color: #FCA5A5; }

    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <h1>照片管理</h1>
            <!-- 添加照片入口 -->
            <div class="btn-add">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
            </div>
        </div>
        <div class="mode-bar">
            <span class="mode-text">已选择 3 张照片</span>
        </div>
        <div class="grid">
            <div class="cell selected"></div><div class="cell"></div><div class="cell selected"></div><div class="cell"></div>
            <div class="cell selected"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
        <div class="context-footer">
            <div class="btn-tool">
                <svg width="18" height="18" fill="white" viewBox="0 0 16 16"><path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.121l6.734-6.734z"/></svg>
                移动
            </div>
            <div class="btn-tool danger">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/></svg>
                删除
            </div>
        </div>
    </div>
</body>
</html>
