<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 地图引导提示 (Map Prompt)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }
        .phone {
            width: 375px; height: 812px; background: white; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }
        .map-bg { flex: 1; background: #E2E8F0 url('https://api.mapbox.com/styles/v1/mapbox/light-v10/static/120.15,30.25,12,0/800x1200?access_token=unused') center/cover; position: relative; }

        /* 顶部通透 Overlay */
        .overlay { position: absolute; top: 54px; left: 16px; right: 16px; gap: 12px; display: flex; flex-direction: column; }
        
        /* 极简地点引导 Pill */
        .location-prompt {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            padding: 16px 20px; border-radius: 24px; display: flex; align-items: center; gap: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.5);
        }
        .prompt-icon { width: 40px; height: 40px; border-radius: 12px; background: #FEF3C7; display: flex; align-items: center; justify-content: center; color: #B45309; }
        .prompt-copy { flex: 1; }
        .prompt-copy h5 { font-size: 14px; font-weight: 900; color: var(--ink); }
        .prompt-copy p { font-size: 12px; color: var(--ink-soft); font-weight: 600; margin-top: 2px; }
        .btn-go { width: 32px; height: 32px; border-radius: 16px; background: var(--ink); display: flex; align-items: center; justify-content: center; color: white; }

    </style>
</head>
<body>
    <div class="phone">
        <div class="map-bg">
            <div class="overlay">
                <div class="location-prompt">
                    <div class="prompt-icon">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
                    </div>
                    <div class="prompt-copy">
                        <h5>完善地图足迹</h5>
                        <p>有 3 个事件尚未开启定位</p>
                    </div>
                    <div class="btn-go">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
