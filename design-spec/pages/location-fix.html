<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Spec - 补全地点 (Location Fix)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #020617; --ink-soft: #475569; --accent: #2563EB; --surface: #F8FAFC; --muted: #94A3B8; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; display: flex; justify-content: center; padding: 40px; }
        .phone {
            width: 375px; height: 812px; background: white; border-radius: 50px; border: 10px solid var(--ink);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.2);
        }
        .header { padding: 60px 24px 20px; }
        .title-huge { font-size: 32px; font-weight: 900; letter-spacing: -1.2px; }
        
        .search-container { padding: 0 20px 24px; }
        .search-box { background: var(--surface); height: 56px; border-radius: 16px; display: flex; align-items: center; padding: 0 20px; gap: 12px; }
        .search-placeholder { color: var(--muted); font-weight: 700; font-size: 16px; }

        .suggestion-list { flex: 1; padding: 0 24px; }
        .label-group { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px; }
        
        .location-row { display: flex; align-items: center; gap: 16px; padding: 20px 0; border-bottom: 1px solid #F1F5F9; }
        .loc-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--accent); }
        .loc-info h4 { font-size: 17px; font-weight: 800; color: var(--ink); }
        .loc-info p { font-size: 13px; color: var(--muted); font-weight: 500; margin-top: 2px; }

        .footer { padding: 24px; background: white; border-top: 1px solid #F1F5F9; }
        .btn-confirm { height: 60px; background: var(--ink); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }

    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <h1 class="title-huge">补全地点</h1>
            <p style="color: var(--ink-soft); font-size: 14px; font-weight: 600; margin-top: 4px;">为 12 张照片手动指定位置</p>
        </div>
        <div class="search-container">
            <div class="search-box">
                <svg width="20" height="20" fill="var(--muted)" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
                <span class="search-placeholder">搜索地点或标志物...</span>
            </div>
        </div>
        <div class="suggestion-list">
            <div class="label-group">推荐地点</div>
            <div class="location-row">
                <div class="loc-icon"><svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg></div>
                <div class="loc-info">
                    <h4>西湖风景名胜区</h4>
                    <p>浙江省杭州市西湖区龙井路1号</p>
                </div>
            </div>
            <div class="location-row">
                <div class="loc-icon"><svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg></div>
                <div class="loc-info">
                    <h4>灵隐寺</h4>
                    <p>浙江省杭州市西湖区灵隐路法云弄1号</p>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="btn-confirm">确认位置</div>
        </div>
    </div>
</body>
</html>
