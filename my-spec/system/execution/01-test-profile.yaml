version: 2
project_type: react-native-fullstack
updated_at: 2026-02-11

preflight:
  required: true
  checks:
    - id: backend-venv
      run: test -f backend/.venv/bin/activate
      expect: command-success
    - id: mobile-node-modules
      run: test -d mobile/node_modules
      expect: command-success
    - id: mobile-device
      run: adb devices
      expect: optional-non-empty
      note: 仅在执行前端人工验收且需要真机时检查

profiles:
  backend:
    required: conditional
    gate_level: conditional
    purpose: 后端 API/服务回归（仅后端变更时必须执行）
    trigger:
      - backend/**
    install:
      - cd backend
      - python3 -m venv .venv
      - source .venv/bin/activate
      - pip install -r requirements.txt
    run:
      - cd backend && source .venv/bin/activate && pytest -q
    artifacts:
      - my-spec/artifacts/<change>/reports/backend-pytest.txt
      - my-spec/artifacts/<change>/logs/backend-test.log

  mobile_static:
    required: conditional
    gate_level: conditional
    purpose: 前端静态质量门禁（仅前端变更时必须执行）
    trigger:
      - mobile/**
    install:
      - cd mobile
      - npm install
    run:
      - cd mobile && npm run lint
      - cd mobile && npm run typecheck
    artifacts:
      - my-spec/artifacts/<change>/reports/mobile-lint.txt
      - my-spec/artifacts/<change>/reports/mobile-typecheck.txt

  mobile_unit:
    required: optional
    gate_level: optional
    purpose: RN 组件/Hook 单测（当前项目未默认启用）
    install:
      - cd mobile && npm install -D jest jest-expo @testing-library/react-native @types/jest
    run:
      - cd mobile && npm run test
    note: 启用前需补齐 jest 配置

  mobile_manual_acceptance:
    required: conditional
    gate_level: conditional
    purpose: 前端人工验收（默认主通道）
    trigger:
      - mobile/**
    run:
      - ACTION_REQUIRED with step_id and checklist
    handshake_required: true
    artifacts:
      - my-spec/artifacts/<change>/handshake/
      - my-spec/artifacts/<change>/screenshots/
      - my-spec/artifacts/<change>/reports/manual-acceptance.md

adapter_guideline:
  - 门禁判定以 required 字段为准。
  - gate_level 仅用于语义展示。
  - spec:testplan 和 spec:apply 必须读取本文件。
  - 本项目不使用前端 1:1 自动化测试门禁。
  - 本项目默认策略：后端条件强校验 + 前端静态检查 + 前端人工验收。
