<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统功能模块结构图 - 学术标准版 (更新规则聚类逻辑)</title>
    <style>
        :root {
            --paper: #ffffff;
            --ink: #111111;
            --rule: #000000;
            --rule-soft: #bcbcbc;
        }

        body {
            font-family: "Times New Roman", "SimSun", serif;
            background: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 40px;
        }

        .container { max-width: 1000px; margin: 0 auto; text-align: center; }

        .figure-title {
            font-family: "SimSun", serif;
            font-size: 15px;
            margin-top: 30px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.02em;
        }

        svg {
            background: var(--paper);
            display: block;
            margin: 0 auto;
            border: 1px solid var(--rule-soft);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        svg text {
            fill: var(--ink) !important;
            font-weight: 600 !important;
            paint-order: stroke;
            stroke: #ffffff;
            stroke-width: 0.35px;
            stroke-linejoin: round;
        }

        svg line,
        svg path,
        svg rect,
        svg circle,
        svg ellipse,
        svg polyline,
        svg polygon {
            stroke: var(--rule) !important;
            stroke-width: 1.9px !important;
            stroke-linecap: round;
            stroke-linejoin: round;
            vector-effect: non-scaling-stroke;
        }

        svg polygon { fill: var(--rule) !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 功能模块结构图 (HIPO风格) -->
        <svg width="950" height="650" viewBox="0 0 950 650" xmlns="http://www.w3.org/2000/svg">
            <!-- 根节点 -->
            <rect x="375" y="20" width="200" height="40" fill="none" stroke="#000" stroke-width="1.5"/>
            <text x="475" y="45" text-anchor="middle" font-size="14" font-weight="bold">智能VLOG创作系统</text>

            <!-- 第一层连接线 -->
            <line x1="475" y1="60" x2="475" y2="100" stroke="#000" stroke-width="1"/>
            <line x1="125" y1="100" x2="825" y2="100" stroke="#000" stroke-width="1"/>
            <line x1="125" y1="100" x2="125" y2="120" stroke="#000" stroke-width="1"/>
            <line x1="300" y1="100" x2="300" y2="120" stroke="#000" stroke-width="1"/>
            <line x1="475" y1="100" x2="475" y2="120" stroke="#000" stroke-width="1"/>
            <line x1="650" y1="100" x2="650" y2="120" stroke="#000" stroke-width="1"/>
            <line x1="825" y1="100" x2="825" y2="120" stroke="#000" stroke-width="1"/>

            <!-- 第一层子系统节点 -->
            <rect x="50" y="120" width="150" height="40" fill="none" stroke="#000"/>
            <text x="125" y="145" text-anchor="middle" font-size="13">媒体管理子系统</text>
            <rect x="225" y="120" width="150" height="40" fill="none" stroke="#000"/>
            <text x="300" y="145" text-anchor="middle" font-size="13">事件加工子系统</text>
            <rect x="400" y="120" width="150" height="40" fill="none" stroke="#000"/>
            <text x="475" y="145" text-anchor="middle" font-size="13">AI智能生成系统</text>
            <rect x="575" y="120" width="150" height="40" fill="none" stroke="#000"/>
            <text x="650" y="145" text-anchor="middle" font-size="13">交互与展示系统</text>
            <rect x="750" y="120" width="150" height="40" fill="none" stroke="#000"/>
            <text x="825" y="145" text-anchor="middle" font-size="13">视频导出引擎</text>

            <!-- 第二层功能模块 -->
            <!-- 媒体管理 -->
            <g transform="translate(125, 160)">
                <line x1="0" y1="0" x2="0" y2="150" stroke="#000"/>
                <line x1="0" y1="40" x2="20" y2="40" stroke="#000"/><text x="25" y="45" font-size="11">本地资源批量筛选</text>
                <line x1="0" y1="80" x2="20" y2="80" stroke="#000"/><text x="25" y="85" font-size="11">EXIF元数据解析</text>
                <line x1="0" y1="120" x2="20" y2="120" stroke="#000"/><text x="25" y="125" font-size="11">哈希去重与异步上传</text>
            </g>

            <!-- 事件加工 (重点更新点) -->
            <g transform="translate(300, 160)">
                <line x1="0" y1="0" x2="0" y2="190" stroke="#000"/>
                <line x1="0" y1="40" x2="20" y2="40" stroke="#000"/><text x="25" y="45" font-size="11">线性时空扫描聚类</text>
                <line x1="0" y1="80" x2="20" y2="80" stroke="#000"/><text x="25" y="85" font-size="11">多级业务规则修正</text>
                <line x1="0" y1="120" x2="20" y2="120" stroke="#000"/><text x="25" y="125" font-size="11">碎片合并与噪声过滤</text>
                <line x1="0" y1="160" x2="20" y2="160" stroke="#000"/><text x="25" y="165" font-size="11">地理坐标反编码关联</text>
            </g>

            <!-- AI智能生成 -->
            <g transform="translate(475, 160)">
                <line x1="0" y1="0" x2="0" y2="150" stroke="#000"/>
                <line x1="0" y1="40" x2="20" y2="40" stroke="#000"/><text x="25" y="45" font-size="11">视觉描述特征提取</text>
                <line x1="0" y1="80" x2="20" y2="80" stroke="#000"/><text x="25" y="85" font-size="11">结构化 Prompt 组织</text>
                <line x1="0" y1="120" x2="20" y2="120" stroke="#000"/><text x="25" y="125" font-size="11">LLM叙事与章节生成</text>
            </g>

            <!-- 交互展示 -->
            <g transform="translate(650, 160)">
                <line x1="0" y1="0" x2="0" y2="150" stroke="#000"/>
                <line x1="0" y1="40" x2="20" y2="40" stroke="#000"/><text x="25" y="45" font-size="11">结构化瀑布流展示</text>
                <line x1="0" y1="80" x2="20" y2="80" stroke="#000"/><text x="25" y="85" font-size="11">旅行足迹全景地图</text>
                <line x1="0" y1="120" x2="20" y2="120" stroke="#000"/><text x="25" y="125" font-size="11">地理锚点搜索与修正</text>
            </g>

            <!-- 导出引擎 -->
            <g transform="translate(825, 160)">
                <line x1="0" y1="0" x2="0" y2="190" stroke="#000"/>
                <line x1="0" y1="40" x2="20" y2="40" stroke="#000"/><text x="25" y="45" font-size="11">场景时间轴构建</text>
                <line x1="0" y1="80" x2="20" y2="80" stroke="#000"/><text x="25" y="85" font-size="11">智能配乐片段匹配</text>
                <line x1="0" y1="120" x2="20" y2="120" stroke="#000"/><text x="25" y="125" font-size="11">Media3硬件渲染导出</text>
                <line x1="0" y1="160" x2="20" y2="160" stroke="#000"/><text x="25" y="165" font-size="11">资源本地同步映射</text>
            </g>

        </svg>
        <div class="figure-title">图 3-2 系统功能模块结构图 (同步规则聚类重构)</div>
    </div>
</body>
</html>
