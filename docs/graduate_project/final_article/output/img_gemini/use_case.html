<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统用例图 - 学术版</title>
    <style>
        :root {
            --paper: #ffffff;
            --ink: #111111;
            --rule: #000000;
            --rule-soft: #bcbcbc;
        }

        body {
            font-family: "Times New Roman", "SimSun", serif;
            background: var(--paper);
            color: var(--ink);
            margin: 0;
            padding: 40px;
        }

        .container { max-width: 800px; margin: 0 auto; text-align: center; }

        .figure-title {
            font-family: "SimSun", serif;
            font-size: 15px;
            margin-top: 20px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.02em;
        }

        svg {
            background: var(--paper);
            display: block;
            margin: 0 auto;
            border: 1px solid var(--rule-soft);
            padding: 20px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        svg text {
            fill: var(--ink) !important;
            font-weight: 600 !important;
            paint-order: stroke;
            stroke: #ffffff;
            stroke-width: 0.35px;
            stroke-linejoin: round;
        }

        svg line,
        svg path,
        svg rect,
        svg circle,
        svg ellipse,
        svg polyline,
        svg polygon {
            stroke: var(--rule) !important;
            stroke-width: 1.9px !important;
            stroke-linecap: round;
            stroke-linejoin: round;
            vector-effect: non-scaling-stroke;
        }

        svg polygon { fill: var(--rule) !important; }
        svg [stroke-dasharray] { stroke-width: 1.6px !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 系统用例图 -->
        <svg width="700" height="600" viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg">
            <!-- 外部参与者：用户 -->
            <g transform="translate(50, 250)">
                <circle cx="0" cy="-20" r="10" fill="none" stroke="#000" stroke-width="1.5"/>
                <line x1="0" y1="-10" x2="0" y2="20" stroke="#000" stroke-width="1.5"/>
                <line x1="-15" y1="0" x2="15" y2="0" stroke="#000" stroke-width="1.5"/>
                <line x1="0" y1="20" x2="-10" y2="40" stroke="#000" stroke-width="1.5"/>
                <line x1="0" y1="20" x2="10" y2="40" stroke="#000" stroke-width="1.5"/>
                <text x="0" y="60" text-anchor="middle" font-size="12">用户</text>
            </g>

            <!-- 系统边界 -->
            <rect x="150" y="40" width="400" height="520" fill="none" stroke="#000" stroke-width="1"/>
            <text x="350" y="60" text-anchor="middle" font-size="14" font-weight="bold">智能VLOG创作系统</text>

            <!-- 用例列表 -->
            <g transform="translate(350, 100)">
                <!-- 用例 1 -->
                <ellipse cx="0" cy="0" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="5" text-anchor="middle" font-size="12">照片导入与去重</text>
                
                <!-- 用例 2 -->
                <ellipse cx="0" cy="80" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="85" text-anchor="middle" font-size="12">回忆相册浏览</text>

                <!-- 用例 3 -->
                <ellipse cx="0" cy="160" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="165" text-anchor="middle" font-size="12">旅行足迹查看</text>

                <!-- 用例 4 -->
                <ellipse cx="0" cy="240" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="245" text-anchor="middle" font-size="12">位置信息手动修正</text>

                <!-- 用例 5 -->
                <ellipse cx="0" cy="320" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="325" text-anchor="middle" font-size="12">智能故事生成</text>

                <!-- 用例 6 -->
                <ellipse cx="0" cy="400" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="405" text-anchor="middle" font-size="12">视频预览与导出</text>

                <!-- 用例 7 -->
                <ellipse cx="0" cy="480" rx="80" ry="25" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="485" text-anchor="middle" font-size="12">系统反馈查看</text>
            </g>

            <!-- 连接线：用户到用例 -->
            <g stroke="#000" stroke-width="1">
                <line x1="65" y1="250" x2="270" y2="100"/>
                <line x1="65" y1="250" x2="270" y2="180"/>
                <line x1="65" y1="250" x2="270" y2="260"/>
                <line x1="65" y1="250" x2="270" y2="340"/>
                <line x1="65" y1="250" x2="270" y2="420"/>
                <line x1="65" y1="250" x2="270" y2="500"/>
                <line x1="65" y1="250" x2="270" y2="580" style="display:none"/> <!-- 隐藏多余线 -->
            </g>

            <!-- 外部参与者：后端服务/外部API -->
            <g transform="translate(650, 250)">
                <rect x="-20" y="-30" width="40" height="60" fill="none" stroke="#000" stroke-width="1"/>
                <text x="0" y="50" text-anchor="middle" font-size="12">外部服务</text>
                <text x="0" y="65" text-anchor="middle" font-size="10" font-style="italic">(AI/地图)</text>
            </g>

            <!-- 连接线：服务到用例 -->
            <g stroke="#000" stroke-width="1" stroke-dasharray="4,2">
                <line x1="630" y1="250" x2="430" y2="320"/>
                <line x1="630" y1="250" x2="430" y2="240"/>
            </g>

        </svg>
        <div class="figure-title">图 2-3 系统用例图</div>
    </div>
</body>
</html>
